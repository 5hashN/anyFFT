name: Build and Test (FFTW Serial Only)

on:
  push:
    branches: [ "main" , "testing"]
  pull_request:
    branches: [ "main" , "testing"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # If one fails, let the others finish
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++

    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        # Add cmake and ninja-build for scikit-build-core
        sudo apt-get install -y build-essential cmake ninja-build

        # Install only Serial FFTW and OpenMP (No MPI)
        sudo apt-get install -y libfftw3-dev libomp-dev

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        # Optional dependencies for testing/plotting if not handled by your pyproject.toml
        pip install pytest matplotlib

    - name: Compile and Install anyFFT
      run: |
        echo "Using Compiler: $CXX"
        $CXX --version

        # Explicitly lock the build to the serial CPU backend using our new CMake flags
        pip install -v . \
          -C cmake.define.ANYFFT_USE_FFTW=ON \
          -C cmake.define.ANYFFT_USE_MPI=OFF \
          -C cmake.define.ANYFFT_USE_CUDA=OFF \
          -C cmake.define.ANYFFT_USE_HIP=OFF

    - name: Run Test Suite
      run: |
        # This will run only serial FFTW tests.
        # GPU and MPI tests will gracefully skip based on your pytest setup.
        anyfft-test