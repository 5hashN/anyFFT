name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # If one fails, let the others finish
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        compiler: [gcc, clang]

    env:
      # Force setuptools to use the matrix compiler
      CC: ${{ matrix.compiler }}
      CXX: ${{ matrix.compiler == 'gcc' && 'g++' || 'clang++' }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        # Standard build tools
        sudo apt-get install -y build-essential

        # Install Compilers if not present
        if [ "${{ matrix.compiler }}" = "clang" ]; then
          sudo apt-get install -y clang
        else
          sudo apt-get install -y g++
        fi

        # Install FFTW3 (Serial + MPI + OpenMP) and OpenMPI
        sudo apt-get install -y libfftw3-dev libfftw3-mpi-dev libomp-dev openmpi-bin libopenmpi-dev

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy mpi4py pybind11 setuptools matplotlib

    - name: Compile and Install anyFFT
      run: |
        # Print compiler version for debugging logs
        $CXX --version

        # Build with verbose output to see flags
        pip install -v .

    - name: Run Test Suite
      run: |
        python3 run_tests.py